<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>特定商取引法に基づく表記</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./tsms-design.css?v=20260227-3">
  <style>
    .legal-main{max-width:860px;margin:0 auto;padding:16px;display:grid;gap:14px;}
    .legal-card{border:var(--line-regular) solid var(--border);background:var(--surface-1);padding:14px;border-radius:var(--radius-md);} 
    .legal-card h1{margin:0 0 10px;}
    .legal-table{display:grid;grid-template-columns:180px 1fr;gap:8px 12px;}
    .legal-k{font-weight:700;}
    .legal-links{display:flex;gap:10px;flex-wrap:wrap;}
    @media (max-width:640px){.legal-table{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <header class="header">特定商取引法に基づく表記</header>
  <main class="legal-main">
    <section class="legal-card">
      <h1>特定商取引法に基づく表記</h1>
      <div class="legal-table">
        <div class="legal-k">販売事業者</div><div>TSMS運営</div>
        <div class="legal-k">運営責任者</div><div>（運用者名を記載）</div>
        <div class="legal-k">所在地</div><div>（所在地を記載）</div>
        <div class="legal-k">連絡先</div><div>（問い合わせメールアドレスを記載）</div>
        <div class="legal-k">販売価格</div><div>プラン紹介・決済画面に表示</div>
        <div class="legal-k">商品代金以外の必要料金</div><div>通信料等はユーザー負担</div>
        <div class="legal-k">支払方法</div><div>クレジットカード（Stripe）</div>
        <div class="legal-k">支払時期</div><div>申込時および契約更新時</div>
        <div class="legal-k">提供時期</div><div>決済完了後、直ちに利用可能</div>
        <div class="legal-k">解約・返金</div><div>設定画面または決済管理画面から解約可能。返金条件は個別規定による</div>
      </div>
      <p style="margin-top:12px;">最終更新日: 2026-03-07</p>
    </section>
    <div class="legal-links">
      <a class="btn" href="terms.html">利用規約</a>
      <a class="btn" href="privacy.html">プライバシーポリシー</a>
      <a class="btn" href="signup.html">新規登録へ戻る</a>
    </div>
  </main>
  <script src="./cache-version.js"></script>
</body>
</html>
