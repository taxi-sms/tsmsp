<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ログイン</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#ffffff">
  <script>(function(){try{var t=localStorage.getItem("tsms_theme")==="dark"?"dark":"light";document.documentElement.setAttribute("data-theme",t);var m=document.querySelector('meta[name="theme-color"]');if(m)m.setAttribute("content",t==="dark"?"#0F1417":"#F3F6F8");}catch(e){}})();</script>
  <link rel="stylesheet" href="./tsms-design.css?v=20260227-3">
  <style id="login-layout-tweaks">
    main.auth-main{
      max-width:520px;
      min-height:calc(100dvh - var(--header-h));
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:var(--space-2);
    }
    .auth-card{
      border:var(--line-regular) solid var(--border)!important;
      background:var(--surface-1)!important;
      border-radius:var(--radius-md);
      padding:var(--space-3)!important;
      margin:0!important;
      box-shadow:var(--shadow-sm);
    }
    .auth-title{
      margin:0 0 var(--space-2);
      font-size:var(--font-3xl);
      line-height:1.35;
      font-weight:900;
      color:var(--text-primary);
      text-transform:none;
      letter-spacing:0;
    }
    .auth-card .field{
      border-bottom:0;
      padding:0;
      margin:0 0 var(--space-3);
    }
    .auth-card .label{font-size:var(--font-md)!important;}
    .auth-card .input{font-size:var(--font-2xl)!important;}
    .auth-card .btn{width:100%;}
    .auth-msg{
      margin-top:var(--space-3);
      border:var(--line-regular) solid var(--border);
      background:var(--surface-2);
      border-radius:var(--radius-sm);
      padding:var(--space-3);
      white-space:pre-wrap;
      font-size:var(--font-lg);
      line-height:1.45;
      min-height:44px;
    }
    .auth-links{
      display:flex;
      gap:var(--space-3);
      margin-top:var(--space-3);
      flex-wrap:wrap;
      align-items:center;
      font-size:var(--font-lg);
    }
    .brand{
      display:flex;
      justify-content:center;
      align-items:flex-end;
      gap:var(--space-2);
      padding:18px 0 0;
    }
    .brand-main{
      font-weight:900;
      font-size:50px;
      letter-spacing:.04em;
      line-height:1;
    }
    #cacheVersionInline.brand-cache{
      display:block;
      text-align:center!important;
      margin:0 0 2px!important;
      font-size:var(--font-sm)!important;
      line-height:1.2;
      color:var(--text-muted);
      opacity:.8;
      min-height:0;
    }
    .auth-subactions{
      display:grid;
      gap:var(--space-2);
      margin-top:var(--space-2);
    }
    .auth-recovery{
      margin-top:var(--space-3);
      border:var(--line-regular) solid var(--border);
      background:var(--surface-2);
      border-radius:var(--radius-sm);
      padding:var(--space-3);
      display:none;
      gap:var(--space-2);
    }
    .auth-recovery.show{display:grid;}
    .auth-recovery .label{font-size:var(--font-md)!important;}
    .auth-recovery .input{font-size:var(--font-2xl)!important;}
  </style>
</head>
<body>
  <header class="header">ログイン</header>
  <main class="main auth-main">
    <div class="brand" aria-label="アプリタイトル">
      <div class="brand-main">TSMs</div>
    </div>
    <div id="cacheVersionInline" class="brand-cache" aria-label="cache-version"></div>

    <section class="auth-card">
      <h1 class="auth-title">メールアドレスでログイン</h1>

      <div class="field">
        <label class="label" for="email">メール</label>
        <input id="email" class="input" type="email" autocomplete="email" placeholder="you@example.com" />
      </div>

      <div class="field">
        <label class="label" for="password">パスワード</label>
        <input id="password" class="input" type="password" autocomplete="current-password" placeholder="********" />
      </div>

      <button id="btnLogin" class="btn next" type="button">ログイン</button>
      <div class="auth-subactions">
        <button id="btnSendResetMail" class="btn" type="button">再設定メールを送信</button>
      </div>

      <div class="auth-recovery" id="recoveryBox" aria-live="polite">
        <div class="label">メールリンク確認後に新しいパスワードを入力</div>
        <input id="recoveryPassword" class="input" type="password" autocomplete="new-password" placeholder="新しいパスワード（8文字以上）" />
        <input id="recoveryPasswordConfirm" class="input" type="password" autocomplete="new-password" placeholder="確認用パスワード" />
        <button id="btnApplyRecoveryPassword" class="btn next" type="button">新しいパスワードを保存</button>
      </div>

      <div class="auth-msg" id="msg"></div>

      <div class="auth-links">
        <a href="./signup.html">新規登録はこちら</a>
        <a href="./index.html">戻る</a>
      </div>
    </section>
  </main>

  <script type="module">
    import { supabase } from "./supabase-client.js";

    const $ = (id) => document.getElementById(id);
    const setMsg = (t) => { $("msg").textContent = t || ""; };
    const FORCE_HYDRATION_ONCE_KEY = "tsms_force_hydration_once";
    const btnLogin = $("btnLogin");
    const btnSendResetMail = $("btnSendResetMail");
    const recoveryBox = $("recoveryBox");
    const btnApplyRecoveryPassword = $("btnApplyRecoveryPassword");
    const recoveryPassword = $("recoveryPassword");
    const recoveryPasswordConfirm = $("recoveryPasswordConfirm");
    let recoverySessionReady = false;

    async function consumeLogoutQueryIfNeeded() {
      const url = new URL(location.href);
      if (url.searchParams.get("logout") !== "1") return;
      await supabase.auth.signOut();
      url.searchParams.delete("logout");
      try {
        history.replaceState({}, "", url.toString());
      } catch (_) {}
      setMsg("ログアウトしました。");
    }

    function setRecoveryVisible(show) {
      if (!recoveryBox) return;
      recoveryBox.classList.toggle("show", !!show);
    }

    async function initRecoveryFlowIfNeeded() {
      const url = new URL(location.href);
      if (url.searchParams.get("mode") !== "recovery") {
        setRecoveryVisible(false);
        return;
      }

      try {
        const hasCode = !!url.searchParams.get("code");
        if (hasCode) {
          const { error } = await supabase.auth.exchangeCodeForSession(location.href);
          if (error) throw error;
        } else if (location.hash.includes("access_token=")) {
          const hash = new URLSearchParams(location.hash.replace(/^#/, ""));
          const access_token = hash.get("access_token");
          const refresh_token = hash.get("refresh_token");
          if (access_token && refresh_token) {
            const { error } = await supabase.auth.setSession({ access_token, refresh_token });
            if (error) throw error;
          }
        }

        const { data: { session }, error } = await supabase.auth.getSession();
        if (error) throw error;
        if (!session) {
          setMsg("再設定リンクの確認に失敗しました。メールのリンクを開き直してください。");
          setRecoveryVisible(false);
          return;
        }
        recoverySessionReady = true;
        setRecoveryVisible(true);
        setMsg("メールリンクを確認しました。新しいパスワードを入力して保存してください。");

        const clean = new URL(location.href);
        clean.searchParams.delete("code");
        clean.hash = "";
        try { history.replaceState({}, "", clean.toString()); } catch (_) {}
      } catch (err) {
        setRecoveryVisible(false);
        setMsg("再設定リンクの処理に失敗しました: " + (err && err.message ? err.message : String(err)));
      }
    }

    btnLogin.addEventListener("click", async () => {
      setMsg("");
      const email = $("email").value.trim();
      const password = $("password").value;
      if (!email || !password) return setMsg("メールとパスワードを入力してね。");

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) return setMsg("エラー: " + error.message);

      const next = new URL(location.href).searchParams.get("next") || "./index.html";
      setMsg("ログイン成功。遷移します…");
      try { sessionStorage.setItem(FORCE_HYDRATION_ONCE_KEY, "1"); } catch (_) {}
      location.href = next;
    });

    if (btnSendResetMail) {
      btnSendResetMail.addEventListener("click", async () => {
        setMsg("");
        const email = $("email").value.trim();
        if (!email) {
          setMsg("再設定メールの送信にはメールアドレス入力が必要です。");
          return;
        }
        btnSendResetMail.disabled = true;
        const original = btnSendResetMail.textContent;
        btnSendResetMail.textContent = "送信中...";
        try {
          const redirectTo = new URL("login.html?mode=recovery", location.href).toString();
          const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo });
          if (error) throw error;
          setMsg("再設定メールを送信しました。受信ボックス（迷惑メールも）を確認してください。");
        } catch (err) {
          setMsg("再設定メール送信に失敗しました: " + (err && err.message ? err.message : String(err)));
        } finally {
          btnSendResetMail.disabled = false;
          btnSendResetMail.textContent = original || "再設定メールを送信";
        }
      });
    }

    if (btnApplyRecoveryPassword) {
      btnApplyRecoveryPassword.addEventListener("click", async () => {
        setMsg("");
        const next = String(recoveryPassword && recoveryPassword.value ? recoveryPassword.value : "");
        const confirm = String(recoveryPasswordConfirm && recoveryPasswordConfirm.value ? recoveryPasswordConfirm.value : "");
        if (!next || !confirm) {
          setMsg("新しいパスワードと確認用パスワードを入力してください。");
          return;
        }
        if (next.length < 8) {
          setMsg("パスワードは8文字以上で入力してください。");
          return;
        }
        if (next !== confirm) {
          setMsg("確認用パスワードが一致しません。");
          return;
        }
        if (!recoverySessionReady) {
          const { data: { session } } = await supabase.auth.getSession();
          if (!session) {
            setMsg("再設定セッションが見つかりません。メールリンクを開き直してください。");
            return;
          }
          recoverySessionReady = true;
        }

        btnApplyRecoveryPassword.disabled = true;
        const original = btnApplyRecoveryPassword.textContent;
        btnApplyRecoveryPassword.textContent = "保存中...";
        try {
          const { error } = await supabase.auth.updateUser({ password: next });
          if (error) throw error;
          try { await supabase.auth.signOut(); } catch (_) {}
          recoverySessionReady = false;
          if (recoveryPassword) recoveryPassword.value = "";
          if (recoveryPasswordConfirm) recoveryPasswordConfirm.value = "";
          setRecoveryVisible(false);
          const clean = new URL(location.href);
          clean.searchParams.delete("mode");
          clean.hash = "";
          try { history.replaceState({}, "", clean.toString()); } catch (_) {}
          setMsg("パスワードを更新しました。新しいパスワードでログインしてください。");
        } catch (err) {
          setMsg("パスワード更新に失敗しました: " + (err && err.message ? err.message : String(err)));
        } finally {
          btnApplyRecoveryPassword.disabled = false;
          btnApplyRecoveryPassword.textContent = original || "新しいパスワードを保存";
        }
      });
    }

    await consumeLogoutQueryIfNeeded();
    await initRecoveryFlowIfNeeded();
  </script>
  <script src="./cache-version.js"></script>
</body>
</html>
